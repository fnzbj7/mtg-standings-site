<html lang="en">

		<link rel="stylesheet" href="styles/main.css" />
	</head>
	<body>
		<header>
			<h1>Magic: The Gathering Standings</h1>
			<p>Event Date: <span id="event-date"></span></p>
			<div class="scoring-toggle">
				<label>
					<input type="checkbox" id="special-scoring" />
					Use Special Scoring (Double Best, Ignore Worst)
				</label>
			</div>
		</header>
		<main>
			<form id="upload-form">
				<input id="file-input" type="file" accept=".txt,.json,.html" />
			</form>

			<!-- <pre id="file-content" style="white-space: pre-wrap"></pre> -->
			<table id="standings">
				<thead>
					<tr>
						<th><span>Rank</span></th>
						<th>Name</th>
						<th><span>Points</span></th>
						<th>Best</th>
						<th>Worst</th>
						<th>OMW%</th>
					</tr>
				</thead>
				<tbody>
					<!-- Player standings will be dynamically inserted here -->
				</tbody>
			</table>
		</main>
		<script src="js/data.js"></script>
		<script type="module" src="js/app.js"></script>
	</body>
</html>
